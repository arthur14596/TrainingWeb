/* ── EAFC CARD ───────────────────────────────────────── */
function EafcCard({card}){
  const rc={LOW:'#3ba55c',MED:'#f0b132',HIGH:'#ed4245'};
  return (
    <div style={{background:'linear-gradient(135deg,#1a1a2e,#16213e,#0f3460)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:8,maxWidth:360,marginTop:8,overflow:'hidden',boxShadow:'0 4px 24px rgba(0,0,0,0.5)'}}>
      <div style={{padding:'9px 14px 6px',borderBottom:'1px solid rgba(255,255,255,0.06)',display:'flex',alignItems:'center',gap:8}}>
        <span style={{fontSize:10,fontWeight:700,letterSpacing:1.5,color:'#3ba55c'}}>MARKET TIP</span>
        <div style={{flex:1}}/>
        <span style={{fontSize:9,padding:'2px 8px',borderRadius:3,background:rc[card.risk]+'22',color:rc[card.risk],border:'1px solid '+rc[card.risk]+'44',fontWeight:600,letterSpacing:1}}>{card.risk} RISK</span>
      </div>
      <div style={{padding:'12px 14px',display:'flex',gap:14}}>
        <div style={{width:72,height:96,borderRadius:6,flexShrink:0,background:'linear-gradient(160deg,#2a2a4a,#1a1a3a)',border:'1px solid rgba(255,255,255,0.15)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',position:'relative'}}>
          <div style={{position:'absolute',top:4,left:6,fontSize:17,fontWeight:800,color:'#fff',lineHeight:1}}>{card.rating}</div>
          <div style={{position:'absolute',top:23,left:6,fontSize:9,fontWeight:700,color:'rgba(255,255,255,0.65)'}}>{card.position}</div>
          <div style={{fontSize:20,marginTop:8}}>⚽</div>
          <div style={{fontSize:9,fontWeight:700,color:'#fff',marginTop:4,textAlign:'center',padding:'0 4px'}}>{card.player}</div>
          <div style={{position:'absolute',bottom:4,fontSize:7,color:'rgba(255,255,255,0.45)',letterSpacing:0.5}}>{card.accel}</div>
        </div>
        <div style={{flex:1}}>
          <div style={{fontSize:15,fontWeight:700,color:'#dbdee1',marginBottom:2}}>{card.player}</div>
          <div style={{fontSize:11,color:'#80848e',marginBottom:8}}>Trend: <span style={{color:card.trend.startsWith('+')?'#3ba55c':'#ed4245'}}>{card.trend}</span></div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'5px 10px'}}>
            {[['BUY AT',card.buyAt.toLocaleString()+' c','#f0b132'],['SELL AT',card.sellAt.toLocaleString()+' c','#3ba55c'],['PROFIT','+'+(card.sellAt-card.buyAt).toLocaleString()+' c','#3ba55c'],['MARKET',card.price.toLocaleString()+' c','#dbdee1']].map(([l,v,c])=>(
              <div key={l}><div style={{fontSize:8,color:'#80848e',letterSpacing:0.8,fontWeight:600,textTransform:'uppercase'}}>{l}</div><div style={{fontSize:12,fontWeight:700,color:c}}>{v}</div></div>
            ))}
          </div>
        </div>
      </div>
      <div style={{padding:'5px 14px 8px',fontSize:9,color:'#80848e',borderTop:'1px solid rgba(255,255,255,0.04)',display:'flex',gap:10}}>
        <span>AccelRATE: {card.accel}</span><span>|</span><span style={{color:'#3ba55c',fontWeight:600}}>FUTBIN.com</span>
      </div>
    </div>
  );
}

/* ── DM PANEL ────────────────────────────────────────── */
function DMPanel({dm,onClose}){
  const [input,setInput]=useState('');
  const [thread,setThread]=useState([{from:dm.from,text:dm.msg,time:dm.time||'now'}]);
  const member=MEMBERS.find(m=>m.name===dm.from)||{name:dm.from,color:'#dbdee1',avatar:dm.from[0]};
  const bottomRef=useRef(null);
  useEffect(()=>bottomRef.current?.scrollIntoView({behavior:'smooth'}),[thread]);
  const send=()=>{
    if(!input.trim()) return;
    const t=new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
    setThread(th=>[...th,{from:'you',text:input,time:t}]);
    setInput('');
    const replies=['appreciate the help mate','got it cheers','yeah makes sense, thanks','ok will do','nice one'];
    setTimeout(()=>{
      setThread(th=>[...th,{from:dm.from,text:replies[Math.floor(Math.random()*replies.length)],time:new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}]);
    },1200+Math.random()*800);
  };
  return (
    <div style={{position:'fixed',bottom:24,right:24,width:330,background:'var(--dc-bg-floating)',border:'1px solid var(--dc-sep)',borderRadius:8,boxShadow:'0 8px 32px rgba(0,0,0,0.7)',display:'flex',flexDirection:'column',maxHeight:420,animation:'dmSlide 0.3s cubic-bezier(0.175,0.885,0.32,1.275)',zIndex:1000}}>
      <div style={{padding:'11px 14px',borderBottom:'1px solid var(--dc-sep)',display:'flex',alignItems:'center',gap:9,flexShrink:0}}>
        <Avatar member={member} size={30}/>
        <div style={{flex:1}}>
          <div style={{fontWeight:600,fontSize:13,color:member.color}}>{dm.from}</div>
          <div style={{fontSize:11,color:'var(--dc-muted)'}}>Direct Message</div>
        </div>
        <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',color:'var(--dc-muted)',fontSize:17,lineHeight:1}}>x</button>
      </div>
      <div style={{flex:1,overflowY:'auto',padding:'11px 13px',display:'flex',flexDirection:'column',gap:7}}>
        {thread.map((r,i)=>{
          const isYou=r.from==='you';
          const m2=MEMBERS.find(m=>m.name===r.from)||member;
          return (
            <div key={i} style={{display:'flex',gap:7,alignItems:'flex-end',flexDirection:isYou?'row-reverse':'row'}}>
              {!isYou&&<Avatar member={m2} size={24}/>}
              <div style={{background:isYou?'var(--dc-brand)':'var(--dc-bg-secondary)',borderRadius:isYou?'8px 0 8px 8px':'0 8px 8px 8px',padding:'7px 11px',maxWidth:'80%'}}>
                <div style={{fontSize:13,color:'#fff',lineHeight:1.45,whiteSpace:'pre-wrap'}}>{r.text}</div>
                <div style={{fontSize:9,color:'rgba(255,255,255,0.38)',marginTop:2,textAlign:isYou?'right':'left'}}>{r.time}</div>
              </div>
            </div>
          );
        })}
        <div ref={bottomRef}/>
      </div>
      <div style={{padding:'9px 11px',borderTop:'1px solid var(--dc-sep)',flexShrink:0}}>
        <div style={{background:'var(--dc-bg-input)',borderRadius:6,display:'flex',alignItems:'center',padding:'7px 11px',gap:7}}>
          <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()}
            placeholder={'Message '+dm.from}
            style={{flex:1,background:'none',border:'none',outline:'none',color:'var(--dc-text)',fontSize:13,fontFamily:'inherit'}} autoFocus/>
          <button onClick={send} style={{background:'none',border:'none',cursor:'pointer',color:input.trim()?'var(--dc-brand)':'var(--dc-int-muted)',fontSize:17}}>send</button>
        </div>
      </div>
    </div>
  );
}

function DMToast({dm,onClick}){
  return (
    <div onClick={onClick} style={{background:'var(--dc-bg-floating)',border:'1px solid var(--dc-sep)',borderRadius:8,padding:'11px 13px',cursor:'pointer',width:290,boxShadow:'0 4px 16px rgba(0,0,0,0.6)',animation:'dmSlide 0.3s cubic-bezier(0.175,0.885,0.32,1.275)',display:'flex',gap:9,alignItems:'flex-start'}}>
      <div style={{width:34,height:34,borderRadius:'50%',background:'var(--dc-brand)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,flexShrink:0,fontWeight:700,color:'#fff'}}>{dm.from[0]}</div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:12,fontWeight:600,color:'var(--dc-text)',marginBottom:2}}>{dm.from} <span style={{fontWeight:400,color:'var(--dc-muted)',fontSize:10}}>DM</span></div>
        <div style={{fontSize:12,color:'var(--dc-muted)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{dm.msg}</div>
      </div>

}

/* ── MESSAGE ROW ─────────────────────────────────────── */
function MsgRow({msg,allMembers,showAvatar,onReact}){
  const [hov,setHov]=useState(false);
  const member=allMembers[msg.author]||{name:msg.author,color:'#dbdee1',avatar:'?',badge:null};
  const t=msg.time||'--:--';
  const emojiMap={'checkmark':'✅','smile':'🙂'};
  return (
    <div onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{display:'flex',gap:16,padding:showAvatar?'4px 16px 2px':'1px 16px',background:hov?'var(--dc-bg-hover)':'transparent',position:'relative',marginTop:showAvatar?12:0,animation:'fadeIn 0.15s ease-out'}}>
      <div style={{width:40,flexShrink:0,paddingTop:showAvatar?2:0}}>
        {showAvatar?<Avatar member={member} size={40}/>
          :hov&&<span style={{fontSize:10,color:'var(--dc-muted)',display:'block',textAlign:'right',paddingTop:4}}>{t}</span>}
      </div>
      <div style={{flex:1,minWidth:0}}>
        {showAvatar&&(
          <div style={{display:'flex',alignItems:'baseline',gap:7,marginBottom:2}}>
            <span style={{fontWeight:500,fontSize:15,color:member.color,cursor:'pointer'}}>{member.name}</span>
            {member.badge&&<span style={{fontSize:12}}>{member.badge}</span>}
            {member.role==='OWNER'&&<span style={{fontSize:9,background:'#f0b13222',color:'#f0b132',padding:'1px 5px',borderRadius:3,fontWeight:600}}>Owner</span>}
            {member.role==='ADMIN'&&<span style={{fontSize:9,background:'#3ba55c22',color:'#3ba55c',padding:'1px 5px',borderRadius:3,fontWeight:600}}>Admin</span>}
            {member.role==='PREMIUM'&&<span style={{fontSize:9,background:'#5865f222',color:'#8a94f8',padding:'1px 5px',borderRadius:3,fontWeight:600}}>Premium</span>}
            <span style={{fontSize:11,color:'var(--dc-muted)'}}>Today at {t}</span>
          </div>
        )}
        {msg.replyTo&&(
          <div style={{display:'flex',alignItems:'center',gap:5,marginBottom:3,opacity:0.65,fontSize:12}}>
            <div style={{width:26,height:9,borderTop:'2px solid var(--dc-muted)',borderLeft:'2px solid var(--dc-muted)',borderRadius:'4px 0 0 0',marginRight:2,flexShrink:0}}/>
            <span style={{color:'var(--dc-muted)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',maxWidth:260}}>
              <strong style={{color:'var(--dc-int-normal)'}}>{msg.replyTo.author}</strong>{' '}{msg.replyTo.text}
            </span>
          </div>
        )}
        <div style={{fontSize:15,color:'var(--dc-text)',lineHeight:1.375,wordBreak:'break-word',whiteSpace:'pre-wrap'}}>
          {(msg.text||'').split(/(@PREMIUM MEMBER|@everyone|@here)/g).map((p,i)=>
            ['@PREMIUM MEMBER','@everyone','@here'].includes(p)
              ?<span key={i} style={{background:'rgba(88,101,242,0.3)',color:'#c9cdfb',borderRadius:3,padding:'0 2px',fontWeight:500}}>{p}</span>
              :p
          )}
        </div>
        {msg.hasCard&&<EafcCard card={msg.hasCard}/>}
        {msg.reactions&&msg.reactions.length>0&&(
          <div style={{display:'flex',gap:4,marginTop:5,flexWrap:'wrap'}}>
            {msg.reactions.map((r,i)=>(
              <div key={i} onClick={()=>onReact&&onReact(msg.id,r.emoji)}
                style={{display:'flex',alignItems:'center',gap:3,background:'rgba(88,101,242,0.15)',border:'1px solid rgba(88,101,242,0.3)',borderRadius:8,padding:'2px 7px',cursor:'pointer',fontSize:13}}>
                <span>{emojiMap[r.emoji]||r.emoji}</span><span style={{fontSize:11,color:'#c9cdfb',fontWeight:500}}>{r.count}</span>
              </div>
            ))}
          </div>
        )}
      </div>
      {hov&&(
        <div style={{position:'absolute',top:-15,right:16,background:'var(--dc-bg-floating)',border:'1px solid var(--dc-sep)',borderRadius:4,display:'flex',gap:2,padding:'3px 5px',zIndex:10}}>
          {['😂','✅','👍','🔥'].map(e=>(
            <button key={e} onClick={()=>onReact&&onReact(msg.id,e)} style={{background:'none',border:'none',cursor:'pointer',fontSize:15,padding:'2px 3px',borderRadius:3}}
              onMouseEnter={ev=>ev.target.style.background='rgba(255,255,255,0.1)'}
              onMouseLeave={ev=>ev.target.style.background='none'}>{e}</button>
          ))}
        </div>
      )}
    </div>
  );
}

/* ── CHANNEL VIEW ────────────────────────────────────── */
function ChannelView({channelId,messages,setMessages,membersMap,settings,onDMReceived}){
  const [input,setInput]=useState('');
  const bottomRef=useRef(null);
  const noTipRef=useRef(null);
  const ch=CHANNELS.flatMap(c=>c.channels).find(c=>c.id===channelId);

  useEffect(()=>{ bottomRef.current?.scrollIntoView({behavior:'smooth'}); },[messages,channelId]);

  /* No-tip-for-a-while timer: 90s after channel switch in a tip channel */
  useEffect(()=>{
    if(noTipRef.current) clearTimeout(noTipRef.current);
    if(!TIP_CHANNELS.includes(channelId)) return;
    noTipRef.current=setTimeout(()=>{
      const q=DM_NO_TIP_QUESTIONS[Math.floor(Math.random()*DM_NO_TIP_QUESTIONS.length)];
      q.msgs.forEach((msg,i)=>{
        setTimeout(()=>{
          onDMReceived({from:MEMBERS.find(m=>m.id===q.from)?.name||q.from,msg,id:Date.now()+i,time:new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})});
        },i*800);
      });
    },90000);
    return ()=>clearTimeout(noTipRef.current);
  },[channelId]);

  const sendMsg=()=>{
    if(!input.trim()) return;
    const t=new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
    setMessages(prev=>({...prev,[channelId]:[...(prev[channelId]||[]),{id:Date.now(),author:'trainee',time:t,text:input}]}));
    const sent=input; setInput('');
    if(noTipRef.current) clearTimeout(noTipRef.current);

    if(TIP_CHANNELS.includes(channelId)){
      /* Staggered fixed DM questions — only in DMs, never in chat */
      const shuffled=[...DM_QUESTIONS_AFTER_TIP].sort(()=>Math.random()-0.5).slice(0,3);
      shuffled.forEach((q,qi)=>{
        q.msgs.forEach((msg,mi)=>{
          setTimeout(()=>{
            onDMReceived({from:MEMBERS.find(m=>m.id===q.from)?.name||q.from,msg,id:Date.now()+qi*10+mi+1,time:new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})});
          },qi*3800+mi*900+Math.random()*1200);
        });
      });
      /* DM flood if enabled */
      if(settings.dmFlood){
        DM_FLOOD_MESSAGES.forEach((dm,i)=>{
          setTimeout(()=>onDMReceived({...dm,id:Date.now()+200+i,time:new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}),i*700+5500);
        });
      }
    }
  };

  const handleReact=(msgId,emoji)=>{
    setMessages(prev=>{
      const msgs=[...(prev[channelId]||[])];
      const idx=msgs.findIndex(m=>m.id===msgId);
      if(idx===-1) return prev;
      const msg={...msgs[idx]};
      const reactions=[...(msg.reactions||[])];
      const ri=reactions.findIndex(r=>r.emoji===emoji);
      if(ri===-1) reactions.push({emoji,count:1});
      else reactions[ri]={...reactions[ri],count:reactions[ri].count+1};
      msgs[idx]={...msg,reactions};
      return {...prev,[channelId]:msgs};
    });
  };

  const msgs=messages[channelId]||[];

  return (
    <div style={{flex:1,display:'flex',flexDirection:'column',minWidth:0,background:'var(--dc-bg-primary)'}}>
      <div style={{height:48,padding:'0 16px',display:'flex',alignItems:'center',gap:10,borderBottom:'1px solid var(--dc-bg-tertiary)',boxShadow:'0 1px 0 rgba(4,4,5,0.2)',flexShrink:0}}>
        <span style={{fontSize:18,color:'var(--dc-int-muted)'}}>#</span>
        <span style={{fontWeight:600,fontSize:15,color:'var(--dc-int-active)'}}>{ch?.name||channelId}</span>
        {ch?.desc&&<><div style={{width:1,height:16,background:'var(--dc-sep)',margin:'0 4px'}}/><span style={{fontSize:13,color:'var(--dc-muted)'}}>{ch.desc}</span></>}
        <div style={{flex:1}}/><span style={{fontSize:18,cursor:'pointer',color:'var(--dc-int-normal)'}}>search</span>
      </div>
      <div style={{flex:1,overflowY:'auto',paddingBottom:16}}>
        <div style={{padding:'44px 16px 20px',borderBottom:'1px solid var(--dc-sep)',marginBottom:14}}>
          <div style={{fontSize:28,marginBottom:7}}>#</div>
          <div style={{fontSize:20,fontWeight:700,marginBottom:3}}>Welcome to #{ch?.name}!</div>
          <div style={{color:'var(--dc-muted)',fontSize:14}}>This is the start of the #{ch?.name} channel.</div>
          {TIP_CHANNELS.includes(channelId)&&<div style={{marginTop:9,fontSize:13,color:'#5865f2',background:'rgba(88,101,242,0.1)',border:'1px solid rgba(88,101,242,0.2)',padding:'7px 12px',borderRadius:4,maxWidth:500}}>Post a card tip here and members will DM you with questions to answer.</div>}
        </div>
        {msgs.map((msg,i)=>{
          const prev=msgs[i-1];
          return <MsgRow key={msg.id} msg={msg} allMembers={membersMap} showAvatar={!prev||prev.author!==msg.author} onReact={handleReact}/>;
        })}
        <div ref={bottomRef}/>
      </div>
      <div style={{padding:'0 16px 22px',flexShrink:0}}>
        <div style={{background:'var(--dc-bg-input)',borderRadius:8,display:'flex',alignItems:'center',padding:'0 16px',minHeight:44}}>
          <button style={{background:'none',border:'none',cursor:'pointer',color:'var(--dc-int-normal)',fontSize:22,padding:'0 12px 0 0',lineHeight:1}}>+</button>
          <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&!e.shiftKey&&sendMsg()}
            placeholder={'Message #'+(ch?.name||channelId)}
            style={{flex:1,background:'none',border:'none',outline:'none',color:'var(--dc-text)',fontSize:15,lineHeight:'44px',fontFamily:'inherit'}}/>
          <div style={{display:'flex',gap:11,paddingLeft:8}}>
            {['gift','GIF','emoji','people'].map((ic,i)=>(
              <button key={i} style={{background:'none',border:'none',cursor:'pointer',color:'var(--dc-int-normal)',fontSize:i===1?12:18,fontWeight:i===1?700:400}}>{ic===1?'GIF':i===0?'🎁':i===2?'🙂':'👥'}</button>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── SIDEBAR ─────────────────────────────────────────── */
function Sidebar({activeChannel,setActiveChannel}){
  const [collapsed,setCollapsed]=useState({});
  const toggle=cat=>setCollapsed(c=>({...c,[cat]:!c[cat]}));
  return (
    <div style={{width:240,background:'var(--dc-bg-secondary)',display:'flex',flexDirection:'column',flexShrink:0,overflow:'hidden'}}>
      <div style={{height:48,padding:'0 16px',display:'flex',alignItems:'center',justifyContent:'space-between',borderBottom:'1px solid var(--dc-bg-tertiary)',cursor:'pointer',flexShrink:0}}>
        <span style={{fontWeight:700,fontSize:14,color:'var(--dc-int-active)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>AJGR X MARC PREMIUM</span>
        <span style={{color:'var(--dc-int-normal)',fontSize:13}}>v</span>
      </div>
      <div style={{flex:1,overflowY:'auto',padding:'8px 0'}}>
        {CHANNELS.map(cat=>(
          <div key={cat.category}>
            <div onClick={()=>toggle(cat.category)} style={{display:'flex',alignItems:'center',padding:'4px 8px',cursor:'pointer',gap:3}}>
              <span style={{fontSize:9,color:'var(--dc-int-normal)',transform:collapsed[cat.category]?'rotate(-90deg)':'',display:'inline-block',transition:'transform 0.15s'}}>v</span>
              <span style={{fontSize:11,fontWeight:600,color:'var(--dc-int-normal)',letterSpacing:0.5,textTransform:'uppercase',flex:1}}>{cat.category}</span>
            </div>
            {!collapsed[cat.category]&&cat.channels.map(ch=>{
              const isActive=activeChannel===ch.id;
              const u=ch.unread||0;
              return (
                <div key={ch.id} onClick={()=>setActiveChannel(ch.id)}
                  style={{display:'flex',alignItems:'center',gap:5,padding:'4px 8px 4px 16px',borderRadius:4,margin:'1px 8px',cursor:'pointer',background:isActive?'var(--dc-bg-mod-sel)':'transparent',color:isActive?'var(--dc-int-active)':u>0?'var(--dc-int-active)':'var(--dc-channel-default)'}}
                  onMouseEnter={e=>!isActive&&(e.currentTarget.style.background='var(--dc-bg-mod-hover)')}
                  onMouseLeave={e=>!isActive&&(e.currentTarget.style.background='transparent')}>
                  <span style={{fontSize:14,opacity:0.55}}>#</span>
                  <span style={{fontSize:14,flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontWeight:u>0?600:400}}>{ch.name}</span>
                  {u>0&&!isActive&&<span style={{background:'#ed4245',color:'#fff',fontSize:10,fontWeight:700,borderRadius:8,padding:'0 5px',minWidth:15,textAlign:'center',lineHeight:'15px'}}>{u}</span>}
                </div>
              );
            })}
          </div>
        ))}
      </div>
      <div style={{height:52,background:'var(--dc-bg-tertiary)',display:'flex',alignItems:'center',padding:'0 8px',gap:8,flexShrink:0}}>
        <Avatar member={CURRENT_USER} size={32}/>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:13,fontWeight:600,color:'var(--dc-text)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{CURRENT_USER.name}</div>
          <div style={{fontSize:11,color:'var(--dc-muted)'}}>Do Not Disturb</div>
        </div>
        <div style={{display:'flex',gap:4}}>
          {['mute','headset','settings'].map((ic,i)=>(
            <button key={i} style={{background:'none',border:'none',cursor:'pointer',color:'var(--dc-int-normal)',fontSize:15,padding:4,borderRadius:4}}>{i===0?'mute':i===1?'audio':'settings'}</button>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ── MEMBERS LIST ────────────────────────────────────── */

    {label:'Owner — 1',members:MEMBERS.filter(m=>m.role==='OWNER')},
    {label:'Admin — 1',members:MEMBERS.filter(m=>m.role==='ADMIN')},
    {label:'Premium — 2',members:MEMBERS.filter(m=>m.role==='PREMIUM')},
    {label:'Members — 3',members:MEMBERS.filter(m=>m.role==='MEMBER')},
  ];
  return (
    <div style={{width:240,background:'var(--dc-bg-secondary)',padding:'16px 8px',overflowY:'auto',flexShrink:0}}>
      {groups.map(g=>(
        <div key={g.label} style={{marginBottom:6}}>
          <div style={{fontSize:11,fontWeight:600,color:'var(--dc-muted)',letterSpacing:0.5,padding:'7px 8px 3px',textTransform:'uppercase'}}>{g.label}</div>
          {g.members.map(m=>(
            <div key={m.id} style={{display:'flex',alignItems:'center',gap:9,padding:'5px 8px',borderRadius:4,cursor:'pointer'}}
              onMouseEnter={e=>e.currentTarget.style.background='var(--dc-bg-mod-hover)'}
              onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
              <div style={{position:'relative'}}>
                <Avatar member={m} size={30}/>
                <div style={{position:'absolute',bottom:-1,right:-1,width:11,height:11,borderRadius:'50%',background:'#3ba55c',border:'2px solid var(--dc-bg-secondary)'}}/>
              </div>
              <div style={{fontSize:13,fontWeight:500,color:m.color}}>{m.name}{m.badge?' '+m.badge:''}</div>
            </div>
          ))}
        </div>
      ))}
      <div style={{marginBottom:6}}>
        <div style={{fontSize:11,fontWeight:600,color:'var(--dc-muted)',letterSpacing:0.5,padding:'7px 8px 3px',textTransform:'uppercase'}}>You</div>
        <div style={{display:'flex',alignItems:'center',gap:9,padding:'5px 8px',borderRadius:4,background:'var(--dc-bg-mod-sel)'}}>
          <div style={{position:'relative'}}>
            <Avatar member={CURRENT_USER} size={30}/>
            <div style={{position:'absolute',bottom:-1,right:-1,width:11,height:11,borderRadius:'50%',background:'#f04747',border:'2px solid var(--dc-bg-secondary)'}}/>
          </div>
          <div>
            <div style={{fontSize:13,fontWeight:500,color:'#3ba55c'}}>{CURRENT_USER.name}</div>
            <div style={{fontSize:11,color:'var(--dc-muted)'}}>Trainee</div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── TRAINING GROUND ─────────────────────────────────── */
function TrainingGround({settings}){
  const [activeChannel,setActiveChannel]=useState('general-chat');
  const [messages,setMessages]=useState(Object.fromEntries(Object.entries(SEED_MESSAGES)));
  const [dmQueue,setDmQueue]=useState([]);
  const [activeDM,setActiveDM]=useState(null);

  const membersMap=useMemo(()=>{
    const m={};
    MEMBERS.forEach(mb=>m[mb.id]=mb);
    m['trainee']=CURRENT_USER;
    return m;
  },[]);

  const onDMReceived=useCallback(dm=>{
    setDmQueue(q=>[...q,dm]);
  },[]);

  return (
    <div style={{flex:1,display:'flex',overflow:'hidden',background:'var(--dc-bg-tertiary)'}}>
      <div style={{width:72,background:'var(--dc-bg-tertiary)',display:'flex',flexDirection:'column',alignItems:'center',padding:'10px 0',gap:6,flexShrink:0}}>
        <div style={{width:46,height:46,borderRadius:16,background:'#5865f2',display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:700,color:'#fff',position:'relative'}}>
          TT
          <div style={{position:'absolute',left:-4,top:'50%',transform:'translateY(-50%)',width:4,height:28,background:'#fff',borderRadius:'0 4px 4px 0'}}/>
        </div>
      </div>
      <Sidebar activeChannel={activeChannel} setActiveChannel={setActiveChannel}/>
      <ChannelView channelId={activeChannel} messages={messages} setMessages={setMessages} membersMap={membersMap} settings={settings} onDMReceived={onDMReceived}/>
      <MembersList/>
      <div style={{position:'fixed',bottom:24,right:activeDM?345:24,zIndex:999,display:'flex',flexDirection:'column-reverse',gap:7}}>
        {dmQueue.slice(-4).map(dm=>(
          <DMToast key={dm.id} dm={dm} onClick={()=>{setActiveDM(dm);setDmQueue(q=>q.filter(d=>d.id!==dm.id));}}/>
        ))}
      </div>
      {activeDM&&<DMPanel dm={activeDM} onClose={()=>setActiveDM(null)}/>}
    </div>
  );
}

/* ── ROOT APP ────────────────────────────────────────── */
function App(){
  const [page,setPage]=useState('Home');
  const [settings,setSettings]=useState({dmFlood:false,marketCrash:false,shockEvents:false});
  const [showSettings,setShowSettings]=useState(false);

  const renderPage=()=>{
    switch(page){
      case 'Home':            return <HomePage setPage={setPage}/>;
      case 'Modules':         return <ModulesPage/>;
      case 'Guides':          return <GuidesPage/>;
      case 'Training Ground': return <TrainingGround settings={settings}/>;
      case 'Statistics':      return <StatsPage/>;
      default:                return <HomePage setPage={setPage}/>;
    }
  };

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100vh',overflow:'hidden'}}>
      <Ticker/>
      <TopNav page={page} setPage={setPage} openSettings={()=>setShowSettings(true)}/>
      <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}}>
        {renderPage()}
      </div>
      {showSettings&&<SettingsModal settings={settings} setSettings={setSettings} onClose={()=>setShowSettings(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
